<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knock</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <header class="topbar">
      <span class="badge" id="badge">승인 요청</span>
      <h1 id="title">Knock</h1>
      <label id="tts-toggle-wrap" class="td-toggle hidden" title="게이트 알림 음성 낭독(TTS) 켜기/끄기">
        <input type="checkbox" id="tts-header-toggle" />
        <span class="td-switch"></span>
        <span class="td-text">🔊 소리</span>
      </label>
      <label id="scope-toggle-wrap" class="td-toggle hidden" title="켜면 본문 내용까지 브리핑, 끄면 제목만 낭독">
        <input type="checkbox" id="scope-header-toggle" />
        <span class="td-switch"></span>
        <span class="td-text">📄 내용</span>
      </label>
      <label id="td-toggle-wrap" class="td-toggle hidden" title="critical 게이트 승인에 Touch ID 요구">
        <input type="checkbox" id="td-toggle" />
        <span class="td-switch"></span>
        <span class="td-text">🔒 Touch ID</span>
      </label>
    </header>

    <!-- update-available banner (dismissible, per-version) -->
    <div id="update-banner" class="update-banner hidden">
      <span id="update-text"></span>
      <button id="update-copy" class="ub-btn" type="button">brew upgrade 복사</button>
      <a id="update-notes" class="ub-btn" href="#">릴리스 노트</a>
      <button id="update-dismiss" class="ub-btn ub-x" type="button" title="이 버전 알림 끄기">✕</button>
    </div>

    <!-- annotate mode -->
    <main id="content" class="markdown hidden"></main>

    <!-- ask mode -->
    <div id="ask-root" class="ask hidden"></div>

    <!-- settings mode -->
    <div id="settings-root" class="settings hidden">
      <label class="toggle-row">
        <input type="checkbox" id="touch-id-toggle" />
        <div class="toggle-text">
          <div class="toggle-label">🔒 critical 게이트에 Touch ID 요구</div>
          <div class="toggle-desc">
            prd 변경 · IAM 확장 · destructive 같은 중요 승인에 지문 / Windows
            Hello 인증을 요구합니다. (에이전트가 이 설정을 읽어 적용)
          </div>
        </div>
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="tts-toggle" />
        <div class="toggle-text">
          <div class="toggle-label">🔊 승인·질문 알림 음성 낭독 (TTS)</div>
          <div class="toggle-desc">
            새 게이트가 뜨면 소리로 읽어줍니다. 기본은 OS 내장 음성
            (macOS say · Windows SAPI). 온디바이스 Supertonic 엔진은
            <code>knock tts install</code> 로 켤 수 있습니다.
          </div>
        </div>
      </label>

      <!-- TTS 세부 옵션 (TTS 켜졌을 때만 표시) -->
      <div id="tts-options" class="tts-options hidden">
        <label class="tts-opt-row">
          <span class="tts-opt-label">낭독 범위</span>
          <select id="tts-scope">
            <option value="title">제목만 (헤더 알림)</option>
            <option value="full">내용까지 브리핑</option>
          </select>
        </label>
        <label class="tts-opt-row">
          <span class="tts-opt-label">스타일</span>
          <select id="tts-style">
            <option value="plain">일반</option>
            <option value="delivery">배달 알림 (반복)</option>
          </select>
        </label>
        <label class="tts-opt-row">
          <span class="tts-opt-label">보이스</span>
          <select id="tts-voice">
            <option value="">기본 (배달=F1)</option>
            <option value="F1">F1 (여성)</option>
            <option value="F2">F2 (여성)</option>
            <option value="F3">F3 (여성)</option>
            <option value="F4">F4 (여성)</option>
            <option value="F5">F5 (여성)</option>
            <option value="M1">M1 (남성)</option>
            <option value="M2">M2 (남성)</option>
            <option value="M3">M3 (남성)</option>
            <option value="M4">M4 (남성)</option>
            <option value="M5">M5 (남성)</option>
          </select>
        </label>
        <label class="tts-opt-row" id="tts-repeat-row">
          <span class="tts-opt-label">반복 횟수</span>
          <input type="number" id="tts-repeat" min="1" max="10" step="1" />
        </label>
        <label class="tts-opt-row tts-opt-col" id="tts-phrase-row">
          <span class="tts-opt-label">배달 문구 <code>{n}</code>=건수</span>
          <input type="text" id="tts-phrase" placeholder="노크 주문! 대기중인 요청 {n}건입니다." />
        </label>
      </div>

      <div class="settings-meta">
        <a href="#" id="report-bug">🐞 버그 신고</a>
        <a href="#" id="release-notes">📋 릴리스 노트</a>
        <span id="version-tag" class="version-tag"></span>
      </div>
    </div>

    <footer class="actions">
      <!-- annotate actions (vertical option cards, like ask) -->
      <div id="annotate-footer" class="hidden">
        <div class="ask-options">
          <div class="ask-opt" id="opt-approve" tabindex="0">
            <span class="ask-opt-num">1</span>
            <div class="ask-opt-body"><div class="ask-opt-label">✓ 승인</div></div>
          </div>
          <label class="ask-opt ann-input">
            <span class="ask-opt-num">2</span>
            <textarea
              id="feedback"
              class="ann-textarea"
              rows="2"
              placeholder="변경요청·피드백 입력 → 제출 (Cmd+Enter · 이미지 붙여넣기 가능)"
            ></textarea>
          </label>
          <div class="ask-opt" id="opt-cancel" tabindex="0">
            <span class="ask-opt-num">3</span>
            <div class="ask-opt-body"><div class="ask-opt-label">✗ 취소</div></div>
          </div>
        </div>
        <div class="btn-row">
          <button id="send" class="btn primary" disabled title="Cmd+Enter">
            제출 ✓
          </button>
        </div>
      </div>

      <!-- ask actions (wizard) -->
      <div id="ask-footer" class="btn-row hidden">
        <button id="ask-dismiss" class="btn ghost" title="Esc">✗ 닫기</button>
        <button id="ask-prev" class="btn ghost hidden" title="← 방향키">← 이전</button>
        <button id="ask-next" class="btn primary" disabled title="→ 방향키">다음 →</button>
        <button id="ask-submit" class="btn primary hidden" title="Cmd+Enter">제출 ✓</button>
      </div>

      <!-- settings actions -->
      <div id="settings-footer" class="btn-row hidden">
        <button id="settings-close" class="btn primary" title="Esc">완료</button>
      </div>
    </footer>
  </body>
</html>
