name: release

# Push a tag (e.g. `git tag v0.1.4 && git push --tags`) to:
#   1. build the macOS (arm64) and Windows (x64) binaries
#   2. attach them to a GitHub Release
#   3. bump the Homebrew formula in hihenen/homebrew-tap (macOS asset)
#
# Requires repo secret TAP_TOKEN (contents:write on hihenen/homebrew-tap) for step 3.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            asset: knock-macos-aarch64
            binpath: src-tauri/target/release/knock
          - os: windows-latest
            asset: knock-windows-x64.exe
            binpath: src-tauri/target/release/knock.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: bun install

      - name: Build (CLI binary)
        run: bun run tauri build --no-bundle

      - name: Package
        shell: bash
        run: cp "${{ matrix.binpath }}" "${{ matrix.asset }}"

      - name: Extract changelog section for this tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Pull the "## [VERSION] ..." section out of CHANGELOG.md.
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {f=1; next}
            f && /^## \[/ {f=0}
            f {print}
          ' CHANGELOG.md > release-notes.md
          [ -s release-notes.md ] || echo "See CHANGELOG.md" > release-notes.md

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          body_path: release-notes.md
          generate_release_notes: true

  formula:
    needs: build
    runs-on: macos-14
    steps:
      - name: Bump Homebrew formula (macOS asset)
        continue-on-error: true
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "TAP_TOKEN 미설정 — homebrew-tap formula 갱신 스킵"
            exit 0
          fi
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          curl -fsSL -o knock-macos-aarch64 \
            "https://github.com/${{ github.repository }}/releases/download/${TAG}/knock-macos-aarch64"
          SHA=$(shasum -a 256 knock-macos-aarch64 | cut -d' ' -f1)
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/hihenen/homebrew-tap.git" tap
          cd tap
          sed -i '' -E \
            -e "s|/download/v[0-9][0-9.]*/|/download/${TAG}/|" \
            -e "s|version \"[0-9][0-9.]*\"|version \"${VERSION}\"|" \
            -e "s|sha256 \"[a-f0-9]*\"|sha256 \"${SHA}\"|" \
            Formula/knock.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/knock.rb
          git commit -m "knock ${VERSION}" || { echo "변경 없음"; exit 0; }
          git push
          echo "homebrew-tap formula → ${VERSION} (sha256=${SHA})"
